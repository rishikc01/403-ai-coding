<style>

    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c6af7;

    --accent3: #6af7c4;

// ─── CSV PARSER ───────────────────────────────────────────────────────────────
function cleanProj(p) {
  if (!p) return null;
  p = p.trim();
  if (!p) return null;
  if (!p.toLowerCase().startsWith('project')) p = 'Project ' + p;
  return p;
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^\uFEFF/, ''));
  const students = {};

  for (let i = 1; i < lines.length; i++) {
    // handle commas inside quoted fields
    const cols = lines[i].match(/(".*?"|[^,]+|(?<=,)(?=,)|(?<=,)$|^(?=,))/g) || [];
    const row = {};
    headers.forEach((h, idx) => {
      row[h] = (cols[idx] || '').replace(/^"|"$/g, '').trim();
    });

    const netId = row['NetID'];
    if (!netId) continue;

    const prefCols = ['First (1) Choice','Second (2)  Choice','Third (3) Choice','Fourth (4) Choice','Fifth (5) Choice'];
    const prefs = [];
    for (const col of prefCols) {
      const v = cleanProj(row[col]);
      if (v && !prefs.includes(v)) prefs.push(v);
    }

    const tmCols = ['Team Member #1 UW NetID','Team Member #2 UW NetID','Team Member #3 UW NetID'];
    const teammates = [];
    for (const col of tmCols) {
      const t = (row[col] || '').trim();
      if (t && t !== netId) teammates.push(t);
    }

    students[netId] = {
      name: row['Name'] || netId,
      netId,
      pitched: cleanProj(row['Project Pitched']),
      prefs,
      teammates,
    };
  }
  return students;
}

// ─── ALGORITHM ────────────────────────────────────────────────────────────────
const RANK_SCORE = {0:10,1:8,2:5,3:3,4:1};

function prefScore(student, project) {
  const idx = student.prefs.indexOf(project);
  return idx >= 0 ? (RANK_SCORE[idx] || 0) : 0;
}

function tmOverlap(student, memberSet) {
  return student.teammates.filter(t => memberSet.has(t)).length;
}

function pitcherConstraints(students) {
  const pc = {};
  for (const [nid, s] of Object.entries(students)) {
    if (s.pitched && s.prefs[0] === s.pitched) pc[s.pitched] = nid;
  }
  return pc;
}

function selectProjects(students) {
  const n = Object.keys(students).length;
  const maxTeams = Math.ceil(n / 4) + 1;

  const demand = {};
  for (const s of Object.values(students)) {
    for (const p of s.prefs) demand[p] = (demand[p] || 0) + 1;
  }

  const required = new Set(Object.keys(pitcherConstraints(students)));
  const extras = Object.keys(demand)
    .filter(p => !required.has(p))
    .sort((a, b) => demand[b] - demand[a]);

  const selected = [...required];
  for (const p of extras) {
    if (selected.length >= maxTeams) break;
    selected.push(p);
  }
  return selected;
}

function assign(students, selectedProjects) {
  const teams = {};
  for (const p of selectedProjects) teams[p] = [];
  const remaining = new Set(Object.keys(students));
  const pc = pitcherConstraints(students);

  // Place pitchers first
  for (const [proj, nid] of Object.entries(pc)) {
    if (teams[proj] && remaining.has(nid)) {
      teams[proj].push(nid);
      remaining.delete(nid);
    }
  }

  // Sort by most constrained
  const order = [...remaining].sort((a, b) => {
    const aOpts = students[a].prefs.filter(p => p in teams).length;
    const bOpts = students[b].prefs.filter(p => p in teams).length;
    return aOpts - bOpts;
  });

  for (const nid of order) {
    const s = students[nid];
    let bestProj = null, bestScore = -999;

    for (const proj of selectedProjects) {
      if (teams[proj].length >= 6) continue;
      const ps = prefScore(s, proj);
      const ts = tmOverlap(s, new Set(teams[proj]));
      const sizePenalty = Math.max(0, teams[proj].length - 4);
      const score = ps * 3 + ts * 4 - sizePenalty;
      if (score > bestScore) { bestScore = score; bestProj = proj; }
    }

    if (!bestProj) bestProj = selectedProjects.reduce((a, b) =>
      teams[a].length <= teams[b].length ? a : b);

    teams[bestProj].push(nid);
    remaining.delete(nid);
  }

  return teams;
}

function fixSizes(teams, students, selectedProjects, minSz=4, maxSz=6) {
  let projects = selectedProjects.filter(p => p in teams);

  for (let iter = 0; iter < 200; iter++) {
    const small = projects.filter(p => teams[p] && teams[p].length > 0 && teams[p].length < minSz);
    const large = projects.filter(p => teams[p] && teams[p].length > maxSz);
    if (!small.length && !large.length) break;

    for (const bigP of large) {
      while (teams[bigP].length > maxSz) {
        const student = teams[bigP].pop();
        const s = students[student];
        const candidates = projects
          .filter(p => p !== bigP && teams[p].length < maxSz)
          .sort((a,b) => prefScore(s,b) - prefScore(s,a));
        if (candidates.length) { teams[candidates[0]].push(student); }
        else { teams[bigP].push(student); break; }
      }
    }

    for (const smP of small) {
      while (teams[smP] && teams[smP].length > 0) {
        const student = teams[smP][0];
        const s = students[student];
        const candidates = projects
          .filter(p => p !== smP && teams[p].length < maxSz)
          .sort((a,b) => prefScore(s,b) - prefScore(s,a));
        teams[smP].shift();
        const dest = candidates[0] || projects.filter(p=>p!==smP).reduce((a,b)=>teams[a].length<=teams[b].length?a:b);
        teams[dest].push(student);
      }
    }

    // Remove empty
    projects = projects.filter(p => { if (!teams[p] || !teams[p].length) { delete teams[p]; return false; } return true; });
  }

  return { teams, projects };
}

function evaluate(teams, students) {
  const pc = pitcherConstraints(students);
  let total=0, inTop5=0, sumPs=0, sumTs=0, tmSat=0, tmTot=0, pOk=0, pTot=0;

  for (const [proj, members] of Object.entries(teams)) {
    const mset = new Set(members);
    for (const nid of members) {
      const s = students[nid];
      const ps = prefScore(s, proj);
      const ts = tmOverlap(s, new Set([...mset].filter(x=>x!==nid)));
      sumPs += ps; sumTs += ts;
      if (ps > 0) inTop5++;
      total++;
      if (s.teammates.length) {
        tmTot++;
        if (s.teammates.some(t => mset.has(t))) tmSat++;
      }
    }
  }
  for (const [proj, nid] of Object.entries(pc)) {
    pTot++;
    if (teams[proj] && teams[proj].includes(nid)) pOk++;
  }

  return {
    total,
    inTop5Pct: total ? Math.round(100*inTop5/total) : 0,
    avgPref: total ? (sumPs/total).toFixed(2) : 0,
    avgTm: total ? (sumTs/total).toFixed(2) : 0,
    pitcher: `${pOk}/${pTot}`,
    tmPct: tmTot ? Math.round(100*tmSat/tmTot) : 0,
  };
}

// ─── RUN ──────────────────────────────────────────────────────────────────────
let lastTeams = null;
let lastStudents = null;
let lastProjects = null;

function runMatcher() {
  if (!rawStudents) return;
  setStatus('⚙ Running assignment algorithm…');

  setTimeout(() => {
    const students = rawStudents;
    const selected = selectProjects(students);
    let teams = assign(students, selected);
    const { teams: fixedTeams, projects } = fixSizes(teams, students, selected);

    lastTeams = fixedTeams;
    lastStudents = students;
    lastProjects = projects;

    const metrics = evaluate(fixedTeams, students);
    renderMetrics(metrics, projects.length);
    renderTeams(fixedTeams, students, projects);

    setStatus(`✓ Done — ${metrics.total} students assigned to ${projects.length} teams`);
  }, 50);
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderMetrics(m, teamCount) {
  const el = document.getElementById('metrics-section');
  el.classList.remove('hidden');
  el.innerHTML = `
    <div class="metric-card">
      <div class="metric-label">Students</div>
      <div class="metric-value accent">${m.total}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Teams</div>
      <div class="metric-value accent">${teamCount}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">In Top-5</div>
      <div class="metric-value good">${m.inTop5Pct}%</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Avg Pref Score</div>
      <div class="metric-value good">${m.avgPref}<span style="font-size:1rem;color:var(--muted)"> /10</span></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Has Teammate</div>
      <div class="metric-value ${m.tmPct >= 60 ? 'good' : 'warn'}">${m.tmPct}%</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Pitchers Met</div>
      <div class="metric-value warn">${m.pitcher}</div>
    </div>
  `;
}

function rankChipClass(rank) {
  if (rank === null) return 'rank-na';
  return `rank-${rank}`;
}

function renderTeams(teams, students, projects) {
  const pc = pitcherConstraints(students);
  const grid = document.getElementById('teams-grid');
  grid.innerHTML = '';

  const sorted = [...projects].sort();
  sorted.forEach((proj, i) => {
    if (!teams[proj]) return;
    const members = teams[proj];
    const isPitcherProj = proj in pc;

    const card = document.createElement('div');
    card.className = 'team-card';
    card.style.animationDelay = `${i * 0.04}s`;

    const membersHTML = members.sort().map(nid => {
      const s = students[nid];
      const rank = s.prefs.indexOf(proj) >= 0 ? s.prefs.indexOf(proj) + 1 : null;
      const rankLabel = rank ? `#${rank} choice` : 'not in top 5';
      const rankClass = rank ? `rank-${rank}` : 'rank-na';
      const tms = s.teammates.filter(t => members.includes(t));
      const isPitcher = pc[proj] === nid;
      const color = avatarColor(nid);

      return `
        <div class="member-row">
          <div class="member-avatar" style="background:${color}20;color:${color};border:1px solid ${color}40">
            ${initials(s.name)}
          </div>
          <div class="member-info">
            <div class="member-name">${s.name} <span style="color:var(--muted);font-size:0.72rem">(${nid})</span></div>
            <div class="member-meta">
              <span class="rank-chip ${rankClass}">${rankLabel}</span>
              ${tms.length ? `<span class="tm-chip">✓ ${tms.length} teammate${tms.length>1?'s':''}</span>` : ''}
              ${isPitcher ? `<span style="font-size:0.6rem;color:var(--accent2);font-family:'DM Mono',monospace">pitcher</span>` : ''}
            </div>
          </div>
          ${isPitcher ? '<div class="pitcher-dot"></div>' : ''}
        </div>`;
    }).join('');

    card.innerHTML = `
      <div class="team-card-header">
        <div class="team-name">${proj}</div>
        <div class="team-badges">
          ${isPitcherProj ? '<span class="badge badge-pitcher">PITCHER</span>' : ''}
          <span class="badge badge-size">${members.length} members</span>
        </div>
      </div>
      <div class="team-members">${membersHTML}</div>
    `;

    grid.appendChild(card);
  });

  document.getElementById('results-section').classList.remove('hidden');
  document.getElementById('results-title').textContent = `${projects.length} Teams Assigned`;
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────
function exportCSV() {
  if (!lastTeams) return;
  const pc = pitcherConstraints(lastStudents);
  const rows = [['Project','Team Size','NetID','Name','Preference Rank','Is Pitcher','Preferred Teammates in Team']];

  for (const proj of [...lastProjects].sort()) {
    if (!lastTeams[proj]) continue;
    for (const nid of [...lastTeams[proj]].sort()) {
      const s = lastStudents[nid];
      const rank = s.prefs.indexOf(proj) >= 0 ? s.prefs.indexOf(proj)+1 : 'N/A';
      const tms = s.teammates.filter(t => lastTeams[proj].includes(t) && t !== nid);
      rows.push([proj, lastTeams[proj].length, nid, s.name, rank,
        pc[proj]===nid?'Yes':'No', tms.join('; ')]);
    }
  }

  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = 'team_assignments.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function setStatus(msg) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.classList.add('visible');
}
</script>
